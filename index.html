<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just For Today</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #00ffc8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    border: 2px solid #00ffc8;
    border-radius: 16px;
    padding: 25px;
    width: 90%;
    max-width: 420px;
    text-align: center;
  }

  h1 { margin-bottom: 10px; }
  #date { margin-bottom: 15px; opacity: 0.8; }

  button {
    margin-top: 15px;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #00ffc8;
    color: black;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Just For Today</h1>
  <div id="date"></div>
  <h3 id="title">Loading...</h3>
  <p id="reading"></p>

  <button onclick="loadReading()">Refresh</button>
</div>

<script>
function setDate() {
  const d = new Date();
  document.getElementById('date').innerText =
    d.toLocaleDateString(undefined, {
      weekday: 'long',
      month: 'long',
      day: 'numeric'
    });
}

async function loadReading() {
  const title = document.getElementById('title');
  const reading = document.getElementById('reading');

  title.innerText = "Loading...";
  reading.innerText = "";

  // Try API
  try {
    const res = await fetch('https://api.jftna.org/jft');
    const data = await res.json();

    title.innerText = data.title;
    reading.innerText = data.reading;

    // Save backup
    localStorage.setItem("jft_backup", JSON.stringify(data));
    return;
  } catch (err) {
    console.log("API failed");
  }

  // Fallback
  const backup = localStorage.getItem("jft_backup");

  if (backup) {
    const data = JSON.parse(backup);
    title.innerText = data.title + " (Offline)";
    reading.innerText = data.reading;
  } else {
    title.innerText = "Offline";
    reading.innerText = "Open once with internet to load.";
  }
}

// Init
setDate();
loadReading();
</script>

</body>
</html>

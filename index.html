<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just For Today</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #00ffc8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    border: 2px solid #00ffc8;
    border-radius: 16px;
    padding: 25px;
    width: 90%;
    max-width: 420px;
    text-align: center;
  }

  h1 {
    margin-bottom: 10px;
  }

  #date {
    margin-bottom: 20px;
    font-size: 16px;
    opacity: 0.8;
  }

  button {
    margin-top: 20px;
    padding: 12px 20px;
    font-size: 16px;
    background: #00ffc8;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.8;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Just For Today</h1>
  <div id="date"></div>

  <p>
    Tap below to read today's official NA "Just For Today" message.
  </p>

  <button onclick="goToReading()">
    Read Full JFT
  </button>
</div>

<script>
function setDate() {
  const today = new Date();

  document.getElementById("date").innerText =
    today.toLocaleDateString(undefined, {
      weekday: "long",
      month: "long",
      day: "numeric"
    });
}

function goToReading() {
  // 🔥 Always works — no broken links
  window.open("https://www.jftna.org/", "_blank");
}

setDate();
</script>

</body>
</html>

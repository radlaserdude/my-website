<!DOCTYPE html>
<html>
<body style="background:black;color:#00ffc8;text-align:center;margin-top:100px;font-family:Arial;">

<h1>Just For Today</h1>
<h3 id="title">Loading...</h3>
<p id="reading"></p>

<script>
async function load() {
  try {
    const res = await fetch('reading.json');
    const data = await res.json();

    const entry = data[Math.floor(Math.random() * data.length)];

    document.getElementById('title').innerText = entry.title;
    document.getElementById('reading').innerText = entry.text;
  } catch (e) {
    document.getElementById('title').innerText = "Error loading";
  }
}

// AUTO RUN
load();
</script>

</body>
</html>

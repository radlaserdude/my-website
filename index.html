<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just For Today</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: #00ffc8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  border: 2px solid #00ffc8;
  border-radius: 15px;
  padding: 25px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #00ffc8;
  color: black;
}
</style>
</head>

<body>

<div class="card">
  <h1>Just For Today</h1>
  <div id="date"></div>
  <h3 id="title">Loading...</h3>
  <p id="reading"></p>
  <button onclick="loadReading()">Refresh</button>
</div>

<script>
function getKey() {
  const d = new Date();
  const month = d.toLocaleString('default', { month: 'long' });
  const day = d.getDate();
  return `${month} ${day}`;
}

async function loadReading() {
  const title = document.getElementById('title');
  const reading = document.getElementById('reading');

  title.innerText = "Loading...";
  reading.innerText = "";

  try {
    // 🔥 CRITICAL FIX: force no cache
    const res = await fetch('./reading.json?v=' + Date.now());

    if (!res.ok) throw new Error("File not found");

    const data = await res.json();
    const key = getKey();

    if (data[key]) {
      title.innerText = data[key].title;
      reading.innerText = data[key].text;
    } else {
      title.innerText = "No entry found";
      reading.innerText = key;
    }

  } catch (err) {
    console.log(err);
    title.innerText = "Error loading data";
    reading.innerText = "Check reading.json file";
  }
}

document.getElementById('date').innerText =
  new Date().toLocaleDateString(undefined, {
    weekday: 'long',
    month: 'long',
    day: 'numeric'
  });

loadReading();
</script>

</body>
</html>

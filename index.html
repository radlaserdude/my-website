<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just For Today</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #000;
    color: #00ffc8;
  }

  .card {
    border: 2px solid #00ffc8;
    border-radius: 16px;
    padding: 25px;
    width: 90%;
    max-width: 420px;
    text-align: center;
  }

  button {
    margin-top: 15px;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #00ffc8;
    color: black;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Just For Today</h1>
  <div id="date"></div>
  <h3 id="title">Loading...</h3>
  <p id="reading"></p>

  <button onclick="loadReading()">Refresh</button>
</div>

<script>
function getTodayKey() {
  const d = new Date();
  const month = d.toLocaleString('default', { month: 'long' });
  const day = d.getDate();
  return `${month} ${day}`;
}

function setDate() {
  const d = new Date();
  document.getElementById('date').innerText =
    d.toLocaleDateString(undefined, {
      weekday: 'long',
      month: 'long',
      day: 'numeric'
    });
}

// MAIN LOAD FUNCTION
async function loadReading() {
  document.getElementById('title').innerText = "Loading...";
  document.getElementById('reading').innerText = "";

  // 1️⃣ TRY LOCAL JSON FIRST (THIS FIXES YOUR PROBLEM)
  try {
    const res = await fetch('./reading.json');
    const data = await res.json();

    const todayKey = getTodayKey();

    if (data[todayKey]) {
      document.getElementById('title').innerText = data[todayKey].title;
      document.getElementById('reading').innerText = data[todayKey].reading;
      return;
    }
  } catch (e) {
    console.log("Local JSON failed");
  }

  // 2️⃣ FALLBACK TO API
  try {
    const res = await fetch('https://api.jftna.org/jft');
    const data = await res.json();

    document.getElementById('title').innerText = data.title;
    document.getElementById('reading').innerText = data.reading;

    localStorage.setItem("backup", JSON.stringify(data));
    return;
  } catch (e) {
    console.log("API failed");
  }

  // 3️⃣ FINAL BACKUP (ALWAYS SHOWS SOMETHING)
  const backup = localStorage.getItem("backup");

  if (backup) {
    const data = JSON.parse(backup);
    document.getElementById('title').innerText = data.title + " (Offline)";
    document.getElementById('reading').innerText = data.reading;
  } else {
    document.getElementById('title').innerText = "Offline";
    document.getElementById('reading').innerText = "No data available yet.";
  }
}

setDate();
loadReading();
</script>

</body>
</html>

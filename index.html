<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just For Today</title>

<link rel="manifest" href="manifest.json">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: 0.3s;
  }

  body.dark {
    background: #000;
    color: #00ffc8;
  }

  body.light {
    background: #f5f5f5;
    color: #111;
  }

  .card {
    border-radius: 16px;
    padding: 30px 20px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
  }

  .dark .card { border: 2px solid #00ffc8; }
  .light .card { border: 2px solid #333; }

  button {
    margin-top: 15px;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .dark button {
    background: #00ffc8;
    color: black;
  }

  .light button {
    background: #333;
    color: white;
  }
</style>
</head>

<body class="dark">

<div class="card" id="card">
  <h1>Just For Today</h1>
  <div id="date"></div>
  <h3 id="title">Loading...</h3>
  <p id="reading"></p>

  <button onclick="toggleTheme()">Toggle Theme</button>
</div>

<script>
let offset = 0;

// Format date
function getDate(offsetDays = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return d.toLocaleDateString(undefined, {
    weekday: 'long',
    month: 'long',
    day: 'numeric'
  });
}

// Load reading
async function load() {
  document.getElementById('title').innerText = "Loading...";
  document.getElementById('reading').innerText = "";

  try {
    const res = await fetch('https://api.jftna.org/jft');
    const data = await res.json();

    document.getElementById('title').innerText = data.title;
    document.getElementById('reading').innerText = data.reading;
  } catch (e) {
    document.getElementById('title').innerText = "Offline mode";
    document.getElementById('reading').innerText = localStorage.getItem("lastReading") || "No cached reading.";
  }
}

// Save last reading
async function cacheReading() {
  try {
    const res = await fetch('https://api.jftna.org/jft');
    const data = await res.json();
    localStorage.setItem("lastReading", data.reading);
  } catch {}
}

// Swipe detection
let startX = 0;
document.getElementById("card").addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.getElementById("card").addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (startX - endX > 50) {
    offset++;
  } else if (endX - startX > 50) {
    offset--;
  }
  document.getElementById('date').innerText = getDate(offset);
});

// Theme toggle
function toggleTheme() {
  const body = document.body;
  if (body.classList.contains("dark")) {
    body.classList.remove("dark");
    body.classList.add("light");
    localStorage.setItem("theme", "light");
  } else {
    body.classList.remove("light");
    body.classList.add("dark");
    localStorage.setItem("theme", "dark");
  }
}

// Load theme
const savedTheme = localStorage.getItem("theme");
if (savedTheme) document.body.className = savedTheme;

// Init
document.getElementById('date').innerText = getDate();
load();
cacheReading();
</script>

</body>
</html>

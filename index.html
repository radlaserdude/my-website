<!DOCTYPE html>
<html>
<body style="background:black;color:#00ffc8;text-align:center;margin-top:100px;font-family:Arial;">

<h1>Just For Today</h1>
<h3 id="title">Loading...</h3>
<p id="reading"></p>

<script>
async function load() {
  try {
    // This API returns today's NA "Just for Today"
    const res = await fetch('https://api.jftna.org/jft');
    const data = await res.json();

    document.getElementById('title').innerText = data.title;
    document.getElementById('reading').innerText = data.reading;

  } catch (e) {
    document.getElementById('title').innerText = "Error loading";
    document.getElementById('reading').innerText = "Check connection or API.";
  }
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html><h2 id="title">Loading...</h2>
<p id="text">Fetching today's reading...</p>
<button>Read Today's Entry</button>
<head>
  <title>Just For Today</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      color: #00ffcc;
      margin-top: 40px;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
      margin-top: 30px;
      box-shadow: 0 0 10px rgba(0,255,204,0.2);
    }

    .date {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 15px;
    }

    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    a.button:hover {
      background: #00ccaa;
    }
  </style>
</head>

<body>

  <h1>Just For Today</h1>

  <div class="card">
  <div class="date" id="date"></div>

  <h2 id="title"></h2>
  <p id="reading"></p>
</div>

<script>
const readings = {
  "0-1": {
    title: "New Beginnings",
    text: "Today is a new chance to grow, improve, and move forward."
  },
  "0-2": {
    title: "Stay Present",
    text: "Focus on today. Don’t let yesterday or tomorrow control you."
  },
  "0-3": {
    title: "Gratitude",
    text: "Find something small to be thankful for today."
  }
};

// Get today's key
const today = new Date();
const key = today.getMonth() + "-" + today.getDate();

// Default if no entry yet
const entry = readings[key] || {
  title: "Just For Today",
  text: "Stay positive and keep moving forward."
};

// Display
document.getElementById("date").innerText = today.toDateString();
document.getElementById("title").innerText = entry.title;
document.getElementById("reading").innerText = entry.text;
</script>

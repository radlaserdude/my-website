<!DOCTYPE html>
<html>
<body style="background:black;color:#00ffc8;text-align:center;margin-top:100px;font-family:Arial;">

<h1>Just For Today</h1>
<h3 id="title">Loading...</h3>
<p id="reading"></p>

<script>
async function load() {
  try {
    const today = new Date();
    const key =
      String(today.getMonth() + 1).padStart(2, '0') + "-" +
      String(today.getDate()).padStart(2, '0');

    const res = await fetch('readings/' + key + '.json');
    const entry = await res.json();

    document.getElementById('title').innerText = entry.title;
    document.getElementById('reading').innerText = entry.text;

  } catch (e) {
    document.getElementById('title').innerText = "Missing reading";
    document.getElementById('reading').innerText = "Add today's file.";
  }
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Just For Today</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      color: #00ffcc;
    }

    .card {
      border: 1px solid #00ffcc;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <h1>Just For Today</h1>

  <div class="card">
    <h2 id="title">Loading...</h2>
    <p id="text">Fetching today's reading...</p>
    <button id="btn">Read Today's Entry</button>
  </div>


  <script>
async function loadReading() {
  try {
    const res = await fetch('reading.json');
    const data = await res.json();

    document.getElementById('title').innerText = data.title;
    document.getElementById('text').innerText = data.text;
    document.getElementById('link').href = data.link;
  } catch (err) {
    console.error('Failed to load reading:', err);
  }
}

loadReading();
</script>

    loadReading();
  </script>
</body>
</html>
<h2 id="title">Loading...</h2>
<p id="text">Loading...</p>
<a id="link" target="_blank">
  <button>Read Today's Entry</button>
</a>

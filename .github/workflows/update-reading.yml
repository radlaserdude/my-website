name: Update Daily Reading

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch reading
        run: |
          cat <<EOF > reading.json
          {
            "title": "Just For Today",
            "text": "Tap to read today's message.",
            "link": "https://www.jftna.org/jft/"
          }
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add reading.json
          git commit -m "Update reading" || echo "No changes"
          git push

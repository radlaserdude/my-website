name: Update Daily Reading

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 THIS FIXES PUSH ERRORS

    steps:
      - uses: actions/checkout@v4   # 🔥 updated version

      - name: Fetch reading
        run: |
          echo '{ "title": "Just For Today", "text": "Tap to read today’s message.", "link": "https://www.jftna.org/jft/" }' > reading.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add reading.json
          git commit -m "Update reading" || echo "No changes"
          git push

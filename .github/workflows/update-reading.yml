name: Update Daily Reading

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
        - uses: actions/setup-node@v4
  with:
    node-version: 20

- name: Fetch reading
  run: node scripts/fetch-reading.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add reading.json
          git commit -m "Update reading" || echo "No changes"
          git push
